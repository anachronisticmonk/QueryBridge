name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  backend:
    name: Backend (install + import smoke)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - name: Import smoke
        # Just confirms every module loads — a real smoke test would also
        # exercise translator → executor on a known query, but that needs
        # a fixture for the Lean binaries (see Lean CI workflow).
        run: |
          python -c "import main, translator, executor, llm_client, lean_client, counterexample_runner"
      - name: Translator round-trip
        # Cheap end-to-end check that doesn't need the Lean binaries.
        run: |
          python - <<'PY'
          from main import run_query, QueryRequest
          for nl in ['show me everyone', 'how many users', 'find Alice',
                     'find users whose role is employee',
                     'find users whose name is Bob and age > 20']:
              r = run_query(QueryRequest(natural_language=nl, mock=True, use_error=False))
              assert len(r['jq_results']) == len(r['sql_results']), (nl, r)
              print(f'{nl:60} -> {r["jq"]}')
          PY
