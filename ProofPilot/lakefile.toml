name = "ProofPilot"
version = "0.1.0"
keywords = ["lean4", "formal-verification", "proof-synthesis", "ai"]
defaultTargets = ["ProofPilot"]

[leanOptions]
pp.unicode.fun = true

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.29.0"

[[lean_lib]]
name = "ProofPilot"

[[lean_exe]]
name = "proofpilot"
root = "Main"
