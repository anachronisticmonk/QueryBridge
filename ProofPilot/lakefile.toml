name = "ProofPilot"

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.29.0"

[[require]]
name = "plausible"
git = "https://github.com/leanprover-community/plausible"
rev = "main"

[[lean_lib]]
name = "ProofPilot"
roots = [
  "Main", "Error", "Bug2", "Bug3", "Properties", "Test",
  "SqlGenMain", "SqlGenError", "SqlGenBug2", "SqlGenBug3",
  "PropRunner", "ProofTrace", "JqGenMain"
]

[[lean_exe]]
name = "sqlGenMain"
root = "SqlGenMain"

[[lean_exe]]
name = "sqlGenError"
root = "SqlGenError"

[[lean_exe]]
name = "sqlGenBug2"
root = "SqlGenBug2"

[[lean_exe]]
name = "sqlGenBug3"
root = "SqlGenBug3"

[[lean_exe]]
name = "propRunner"
root = "PropRunner"

[[lean_exe]]
name = "proofTrace"
root = "ProofTrace"

[[lean_exe]]
name = "test"
root = "Test"
